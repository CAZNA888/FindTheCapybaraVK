<!DOCTYPE html>
<html lang="en-us">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <title>Obby Hug Tower Yandex Games</title>
        <link rel="preconnect" href="https://bridge.playgama.com">
        <link rel="preload" href="Build/29f40cbf1ccfc1f2b011507ed76a4ed2.wasm.unityweb" as="fetch" type="application/wasm" crossorigin>
        <link rel="preload" href="Build/ee93bb1c00c67f39d3ac934c95e7f401.data.unityweb" as="fetch" crossorigin>
        <link rel="preload" href="Build/db03dedc5877f48a92a269b084fdbf10.framework.js.unityweb" as="script">
        <style>
            html, body {
                width: 100%;
                height: 100%;
                padding: 0px;
                margin: 0px;
            }
            .fullscreen-canvas {
                background: #242424;
                width: 100%;
                height: 100%;
                position: absolute;
                top: 0px;
                left: 0px;
            }
            .pre-playgama-loader {
                position: fixed;
                top: 50%;
                left: 50%;
                width: 180px;
                height: 6px;
                overflow: hidden;
                background: rgba(128, 68, 255, 0.2);
                border-radius: 999px;
                transform: translate(-50%, -50%);
                z-index: 10;
                pointer-events: none;
            }
            .pre-playgama-loader.hidden {
                display: none;
            }
            .pre-playgama-loader::before {
                content: "";
                display: block;
                width: 45%;
                height: 100%;
                background: #8c4dff;
                border-radius: inherit;
                animation: pre-playgama-loading 1s ease-in-out infinite;
            }
            @keyframes pre-playgama-loading {
                0% {
                    transform: translateX(-110%);
                }
                100% {
                    transform: translateX(235%);
                }
            }
        </style>
    </head>
    <body>
        <div id="pre-playgama-loader" class="pre-playgama-loader"></div>
        <canvas id="canvas" class="fullscreen-canvas"></canvas>
        <script src="./playgama-bridge-unity.js"></script>
    </body>
</html>
